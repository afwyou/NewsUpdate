name: 每日財經新聞自動爬蟲

on:
  schedule:
    - cron: '0 22 * * *' # 台灣時間早上 6 點自動跑
  workflow_dispatch: # 允許手動點擊執行

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    steps:
    - name: 檢查並複製專案代碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 執行報紙頭條爬蟲
      env:
        PYTHONIOENCODING: utf-8
      run: python scraper.py

    - name: 將更新後的 news.json 提交回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add news.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新：報紙頭條新聞" && git push)
